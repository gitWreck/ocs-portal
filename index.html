<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Remaining Subjects Portal - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link rel="icon" type="image/png" href="CFNR-logo-final.png" />

    <style>
      :root {
        --portal-maroon: #8b1539;
        --portal-green: #04543c;
        --portal-bg: #f4f6f9;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--portal-bg);
        color: #334155;
        /* Force full viewport height and center vertically */
        min-height: 100vh;
        display: flex;
        align-items: center;
      }

      .login-container {
        width: 100%;
      }

      /* Card Styling (Matches Portal) */
      .main-card {
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.5) !important;
        border-top: 6px solid var(--portal-maroon) !important;
      }

      /* Typography */
      .text-maroon {
        color: var(--portal-maroon) !important;
      }
      .section-title {
        color: var(--portal-green);
        font-weight: 700;
        letter-spacing: -0.5px;
      }
    </style>
  </head>
  <body>
    <div class="container login-container py-4">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 px-3">
          <div class="card main-card rounded-4">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-5">
                <h2 class="section-title mb-2">Student Portal</h2>
                <p class="text-muted mb-0">
                  Sign in with your Google email to continue
                </p>
              </div>

              <div id="login-section">
                <div
                  id="g_id_onload"
                  data-client_id="157062663624-4qauas79i4sjfqg8re6cnm1j36tdfd3b.apps.googleusercontent.com"
                  data-callback="handleCredentialResponse"
                  data-auto_prompt="false"
                ></div>

                <div class="d-flex justify-content-center">
                  <div
                    class="g_id_signin"
                    data-type="standard"
                    data-size="large"
                    data-theme="outline"
                    data-text="sign_in_with"
                    data-shape="rectangular"
                    data-logo_alignment="left"
                  ></div>
                </div>
              </div>

              <div id="login-error-section" class="d-none mt-4 text-center">
                <div
                  class="alert alert-danger d-inline-block mb-0 rounded-3 border-0 shadow-sm"
                  id="login-error-message"
                >
                  Unable to continue.
                </div>
              </div>

              <div
                class="mt-5 p-3 bg-light rounded-3 text-center border border-light-subtle"
              >
                <p class="small text-muted mb-0 fw-medium">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-info-circle me-1 text-maroon"
                    viewBox="0 0 16 16"
                    style="vertical-align: -0.125em"
                  >
                    <path
                      d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"
                    />
                    <path
                      d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0"
                    />
                  </svg>
                  Please use the email associated with your student record.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="index.js"></script>
  </body>
</html>
