<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Remaining Subjects Portal - Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-xl-5">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <h2 class="fw-bold mb-1">Student Portal</h2>
                <p class="text-muted mb-0">
                  Sign in with your Google email to continue
                </p>
              </div>

              <div id="login-section">
                <div
                  id="g_id_onload"
                  data-client_id="157062663624-4qauas79i4sjfqg8re6cnm1j36tdfd3b.apps.googleusercontent.com"
                  data-callback="handleCredentialResponse"
                  data-auto_prompt="false"
                ></div>

                <div class="d-flex justify-content-center">
                  <div
                    class="g_id_signin"
                    data-type="standard"
                    data-size="large"
                    data-theme="outline"
                    data-text="sign_in_with"
                    data-shape="rectangular"
                    data-logo_alignment="left"
                  ></div>
                </div>
              </div>

              <div id="login-error-section" class="d-none mt-4">
                <div class="alert alert-danger mb-0" id="login-error-message">
                  Unable to continue.
                </div>
              </div>

              <div class="mt-4 small text-muted text-center">
                Please use the email associated with your student record.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="index.js"></script>
  </body>
</html>
